services:
  mongodb:
    image: mongo:4.4.29
    container_name: mcp-mongodb
    command: mongod --replSet rs0 --bind_ip 127.0.0.1,mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data-v3:/data/db
      - mongodb-config-v3:/data/configdb
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  mongodb-init:
    image: python:3.11-slim
    container_name: mcp-mongodb-init
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - DOCUMENTDB_HOST=mongodb
      - DOCUMENTDB_PORT=27017
      - DOCUMENTDB_DATABASE=mcp_registry
      - DOCUMENTDB_USE_TLS=false
    volumes:
      - ./scripts/init-mongodb-ce.py:/app/scripts/init-mongodb-ce.py:ro
      - ./scripts/registry-admins.json:/app/scripts/registry-admins.json:ro
    command: >
      sh -c "pip install --quiet motor pymongo && python /app/scripts/init-mongodb-ce.py"
    restart: "no"

  registry:
    build:
      context: .
      dockerfile: docker/Dockerfile.registry
    environment:
      - DEPLOYMENT_MODE=with-gateway
      - REGISTRY_MODE=full
      - SECRET_KEY=${SECRET_KEY}
      - AUTH_SERVER_URL=http://auth-server:8888
      - AUTH_SERVER_EXTERNAL_URL=${AUTH_SERVER_EXTERNAL_URL}
      - STORAGE_BACKEND=mongodb-ce
      - DOCUMENTDB_HOST=mongodb
      - DOCUMENTDB_PORT=27017
      - DOCUMENTDB_DATABASE=mcp_registry
      - DOCUMENTDB_REPLICA_SET=rs0
      - DOCUMENTDB_USE_TLS=false
      - AUTH_PROVIDER=keycloak
      - KEYCLOAK_ENABLED=true
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=mcp-gateway
      - KEYCLOAK_CLIENT_ID=mcp-gateway-web
    ports:
      - "8087:8080"
      - "8443:8443"
      - "7860:7860"
    volumes:
      - registry-servers-v3:/app/registry/servers
      - registry-agents-v3:/app/registry/agents
      - registry-models-v3:/app/registry/models
      - registry-logs-v3:/app/logs
    depends_on:
      auth-server:
        condition: service_started
      mongodb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  auth-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    environment:
      - REGISTRY_URL=${REGISTRY_URL}
      - SECRET_KEY=${SECRET_KEY}
      - AUTH_PROVIDER=keycloak
      - KEYCLOAK_ENABLED=true
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_EXTERNAL_URL=${KEYCLOAK_EXTERNAL_URL:-http://localhost:8080}
      - KEYCLOAK_REALM=mcp-gateway
      - KEYCLOAK_CLIENT_ID=mcp-gateway-web
      - STORAGE_BACKEND=mongodb-ce
      - DOCUMENTDB_HOST=mongodb
      - DOCUMENTDB_PORT=27017
      - DOCUMENTDB_USE_TLS=false
      - AUTH_SERVER_HOST=0.0.0.0
    ports:
      - "8888:8888"
    volumes:
      - auth-logs-v3:/app/logs
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  mcpgw-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp-server
      args:
        SERVER_DIR: servers/mcpgw
    environment:
      - HOST=0.0.0.0
      - PORT=8003
      - REGISTRY_BASE_URL=http://registry:8080
    ports:
      - "8003:8003"
    depends_on:
      - registry
    restart: unless-stopped

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_db_data-v3:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_PORT: 8080
      KC_PROXY: edge
      KC_FRONTEND_URL: ${KEYCLOAK_EXTERNAL_URL:-http://localhost:8080}
    ports:
      - "8086:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb-data-v3:
  mongodb-config-v3:
  keycloak_db_data-v3:
  registry-servers-v3:
  registry-agents-v3:
  registry-models-v3:
  registry-logs-v3:
  auth-logs-v3:
