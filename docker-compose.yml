version: '3.8'

services:
  mongodb:
    image: mongo:8.2
    container_name: mcp-mongodb
    command: mongod --replSet rs0 --bind_ip 127.0.0.1,mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  mongodb-init:
    image: python:3.11-slim
    container_name: mcp-mongodb-init
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - DOCUMENTDB_HOST=mongodb
      - DOCUMENTDB_PORT=27017
      - DOCUMENTDB_DATABASE=${DOCUMENTDB_DATABASE:-mcp_registry}
    volumes:
      - ./scripts/init-mongodb-ce.py:/app/scripts/init-mongodb-ce.py:ro
      - ./scripts/registry-admins.json:/app/scripts/registry-admins.json:ro
      - ./scripts/mcp-registry-admin.json:/app/scripts/mcp-registry-admin.json:ro
    command: >
      sh -c "
      pip install --quiet motor pymongo &&
      python /app/scripts/init-mongodb-ce.py
      "
    restart: "no"

  registry:
    build:
      context: .
      dockerfile: docker/Dockerfile.registry
    environment:
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-with-gateway}
      - REGISTRY_MODE=${REGISTRY_MODE:-full}
      - SECRET_KEY=${SECRET_KEY}
      - AUTH_SERVER_URL=${AUTH_SERVER_URL}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-mongodb-ce}
      - DOCUMENTDB_HOST=mongodb
      - DOCUMENTDB_PORT=27017
      - DOCUMENTDB_DATABASE=${DOCUMENTDB_DATABASE:-mcp_registry}
      - DOCUMENTDB_REPLICA_SET=rs0
    ports:
      - "80:8080"
      - "443:8443"
      - "7860:7860"
    volumes:
      - mcp-servers:/app/registry/servers
      - mcp-agents:/app/registry/agents
      - mcp-models:/app/registry/models
      # Removed scopes.yml and federation.json mounts to avoid directory/file conflicts
      - registry-logs:/app/logs
    depends_on:
      auth-server:
        condition: service_started
      mongodb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  auth-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    environment:
      - REGISTRY_URL=${REGISTRY_URL}
      - SECRET_KEY=${SECRET_KEY}
      - AUTH_PROVIDER=${AUTH_PROVIDER:-keycloak}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-mongodb-ce}
      - DOCUMENTDB_HOST=mongodb
      - DOCUMENTDB_PORT=27017
    ports:
      - "8888:8888"
    volumes:
      - auth-logs:/app/logs
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_PORT: 8080
      KC_PROXY: edge
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb-data:
  mongodb-config:
  keycloak_db_data:
  mcp-servers:
  mcp-agents:
  mcp-models:
  registry-logs:
  auth-logs:
